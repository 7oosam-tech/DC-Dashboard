name: Daily Stock Update

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC = 07:00 Riyadh time
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

permissions:
  contents: write           # needed to commit and push data.json

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Fetch stock data via Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_stocks.py

      - name: Commit and push data.json
        run: |
          git config user.name "Husam"
          git config user.email "7oosam@gmail.com"
          git add data.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "daily update $(date -u +%Y-%m-%d)" && git push
